name: documentation

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  foundation:
    name: foundation (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: ""
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.5"
          cache: false
      - name: Run foundation validator tests
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Validate repository foundation
        run: python scripts/validate_docs.py
      - name: Validate versions, change records, and generated changelog
        run: go run ./cmd/starter-kit changes check --repository .
      - name: Run lifecycle-engine tests
        run: go test ./...
      - name: Capture Phase 1 native semantics and capabilities
        run: go run ./cmd/phase1-evidence capture --output phase1-native-evidence.json
      - name: Retain Phase 1 native evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: phase1-native-${{ matrix.os }}
          path: phase1-native-evidence.json
          if-no-files-found: error
          retention-days: 30

  equivalence:
    name: phase1-native-equivalence
    needs: foundation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.5"
          cache: false
      - name: Download native evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: phase1-native-*
          path: phase1-native-evidence
      - name: Require equivalent Phase 1 semantics
        run: go run ./cmd/phase1-evidence compare --directory phase1-native-evidence --output phase1-native-summary.json
      - name: Retain native equivalence summary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: phase1-native-summary
          path: phase1-native-summary.json
          if-no-files-found: error
          retention-days: 30

  validate:
    name: validate
    if: always()
    needs: [foundation, equivalence]
    runs-on: ubuntu-latest
    steps:
      - name: Require every native runner to pass
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            if ("${{ needs.foundation.result }}" !== "success" || "${{ needs.equivalence.result }}" !== "success") {
              core.setFailed("One or more native jobs failed or their Phase 1 semantics diverged.");
            }
