{
  "name": "Executable work item",
  "description": "Propose a fully specified task for an AI or developer.",
  "title": "",
  "labels": ["type:task", "needs-triage"],
  "body": [
    {
      "type": "textarea",
      "id": "human-summary",
      "attributes": {
        "label": "Human summary",
        "description": "What, why now, impact, and an observable Done when statement."
      },
      "validations": {"required": true}
    },
    {
      "type": "textarea",
      "id": "context",
      "attributes": {"label": "Current context"},
      "validations": {"required": true}
    },
    {
      "type": "textarea",
      "id": "references",
      "attributes": {
        "label": "Governing decisions, personas, policy, and specifications",
        "description": "Stable IDs, links, and one-line relevance for each."
      },
      "validations": {"required": true}
    },
    {
      "type": "textarea",
      "id": "scope",
      "attributes": {"label": "Scope"},
      "validations": {"required": true}
    },
    {
      "type": "textarea",
      "id": "out-of-scope",
      "attributes": {"label": "Out of scope"},
      "validations": {"required": true}
    },
    {
      "type": "textarea",
      "id": "acceptance",
      "attributes": {"label": "Acceptance criteria and negative paths"},
      "validations": {"required": true}
    },
    {
      "type": "textarea",
      "id": "verification",
      "attributes": {
        "label": "Tests, evidence, documentation, and communication required"
      },
      "validations": {"required": true}
    },
    {
      "type": "textarea",
      "id": "dependencies",
      "attributes": {"label": "Dependencies, sequencing, and human actions"}
    },
    {
      "type": "checkboxes",
      "id": "readiness",
      "attributes": {
        "label": "Readiness assertion",
        "options": [
          {
            "label": "No unresolved product, architecture, policy, regulatory, or risk decision is hidden in this task.",
            "required": true
          },
          {
            "label": "An authorized implementer can execute this without the originating conversation.",
            "required": true
          }
        ]
      }
    }
  ]
}
