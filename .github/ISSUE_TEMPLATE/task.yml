{
  "name": "Executable work item",
  "description": "Propose a fully specified task for an AI or developer.",
  "title": "",
  "labels": ["type:task", "needs-triage"],
  "body": [
    {
      "type": "markdown",
      "attributes": {
        "value": "Task fitness: describe one singular, actionable, independently completable delivery step. During refinement, use a bounded decomposition outline. If a section can be delivered, evidenced, and closed independently, preserve the shared outcome in a parent and create native child tasks; multiple files or coordinated atomic steps alone do not require decomposition."
      }
    },
    {
      "type": "textarea",
      "id": "human-summary",
      "attributes": {
        "label": "Human summary",
        "description": "What, why now, impact, and an observable Done when statement. Keep the hidden schema marker in place.",
        "value": "<!-- starter-kit-executable-schema:v1 -->"
      },
      "validations": {"required": true}
    },
    {
      "type": "textarea",
      "id": "context",
      "attributes": {"label": "Current context"},
      "validations": {"required": true}
    },
    {
      "type": "textarea",
      "id": "references",
      "attributes": {
        "label": "Governing decisions, personas, policy, and specifications",
        "description": "Stable IDs, links, and one-line relevance for each. Reference standing execution rules; do not copy them into this issue."
      },
      "validations": {"required": true}
    },
    {
      "type": "textarea",
      "id": "scope",
      "attributes": {
        "label": "Scope",
        "description": "State one coherent completion transition plus its ownership, review boundary, and evidence boundary. Do not hide independently completable deliverables here."
      },
      "validations": {"required": true}
    },
    {
      "type": "textarea",
      "id": "out-of-scope",
      "attributes": {"label": "Out of scope"},
      "validations": {"required": true}
    },
    {
      "type": "textarea",
      "id": "acceptance",
      "attributes": {"label": "Acceptance criteria and negative paths"},
      "validations": {"required": true}
    },
    {
      "type": "textarea",
      "id": "verification",
      "attributes": {
        "label": "Tests, evidence, documentation, and communication required"
      },
      "validations": {"required": true}
    },
    {
      "type": "textarea",
      "id": "dependencies",
      "attributes": {
        "label": "Dependencies, sequencing, and task-specific authority",
        "description": "Record actual blockers or exceptional authority boundaries. Do not repeat normal branch, PR, review, merge, or reconciliation workflow."
      }
    },
    {
      "type": "checkboxes",
      "id": "readiness",
      "attributes": {
        "label": "Readiness assertion",
        "options": [
          {
            "label": "No unresolved product, architecture, policy, regulatory, or risk decision is hidden in this task.",
            "required": true
          },
          {
            "label": "An authorized implementer can execute this without the originating conversation.",
            "required": true
          }
        ]
      }
    }
  ]
}
