name: Apply one approved Issue 75 sandbox stage

# Reviewed candidate for installation in the isolated sandbox repository. Apply regenerates
# the stage input from the same dispatch values, binds the downloaded immutable plan to its
# own current mandate, applies once, then re-plans read-only to retain the postcondition and
# any immutable identity outputs needed by the next organic stage.

on:
  workflow_dispatch:
    inputs:
      source_revision:
        description: Exact 40-character reviewed codex-starter-kit commit
        required: true
        type: string
      stage:
        description: Exact Issue 75 sandbox stage
        required: true
        type: choice
        options: [issues-setup, issues-governed, project-setup, relationships-setup, rules-setup, file-initial, file-stale, cleanup-delivery, cleanup-rules, cleanup-file, cleanup-relationships, cleanup-issues]
      approved_by:
        description: Approving human identity used during planning
        required: true
        type: string
      approval_id:
        description: Durable approval record identity used during planning
        required: true
        type: string
      approved_at:
        description: Active approval time in RFC3339 format
        required: true
        type: string
      expires_at:
        description: Authority expiry in RFC3339 format
        required: true
        type: string
      identity_flags_json:
        description: Exact optional identity flags used during planning
        required: false
        default: "{}"
        type: string
      planning_run_id:
        description: Exact run containing the reviewed stage plan artifact
        required: true
        type: string
      planning_artifact:
        description: Exact reviewed stage plan artifact name
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: starter-kit-contract-sandbox
  cancel-in-progress: false

jobs:
  apply:
    environment: ${{ (inputs.stage == 'rules-setup' || inputs.stage == 'cleanup-rules') && 'contract-rules' || ((inputs.stage == 'project-setup' || inputs.stage == 'relationships-setup' || inputs.stage == 'cleanup-relationships') && 'contract-reconciler' || 'contract-seeder') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out sandbox
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check out exact reviewed Starter Kit candidate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: dragondad22/codex-starter-kit
          ref: ${{ inputs.source_revision }}
          path: tool

      - name: Install pinned Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.5
          cache-dependency-path: tool/go.sum

      - name: Download exact reviewed stage planning artifact
        env:
          GH_TOKEN: ${{ github.token }}
          PLANNING_RUN_ID: ${{ inputs.planning_run_id }}
          PLANNING_ARTIFACT: ${{ inputs.planning_artifact }}
          STAGE: ${{ inputs.stage }}
        shell: bash
        run: |
          if [[ ! "$PLANNING_RUN_ID" =~ ^[0-9]+$ ]] || \
             [[ "$PLANNING_ARTIFACT" != "issue-75-$STAGE-planning" ]]; then
            echo "planning run or artifact identity is invalid" >&2
            exit 1
          fi
          gh api \
            "repos/codex-starter-kit-labs/codex-starter-kit-sandbox/actions/runs/$PLANNING_RUN_ID" \
            --jq 'select(.event == "workflow_dispatch" and .path == ".github/workflows/issue-75-sandbox-stage-plan.yml") | .id' \
            | grep -qx "$PLANNING_RUN_ID"
          gh run download "$PLANNING_RUN_ID" \
            --repo codex-starter-kit-labs/codex-starter-kit-sandbox \
            --name "$PLANNING_ARTIFACT" --dir planning

      - name: Validate stage, role, source, and optional identity flags
        env:
          SOURCE_REVISION: ${{ inputs.source_revision }}
          STAGE: ${{ inputs.stage }}
          IDENTITY_FLAGS_JSON: ${{ inputs.identity_flags_json }}
          PLANNING_ARTIFACT: ${{ inputs.planning_artifact }}
        shell: bash
        run: |
          if [[ ! "$SOURCE_REVISION" =~ ^[0-9a-f]{40}$ ]] || \
             [[ "$(git -C tool rev-parse HEAD)" != "$SOURCE_REVISION" ]] || \
             [[ "$PLANNING_ARTIFACT" != "issue-75-$STAGE-planning" ]]; then
            echo "source or planning artifact identity is invalid" >&2
            exit 1
          fi
          cmp .github/workflows/issue-75-sandbox-stage-apply.yml \
            tool/docs/evidence/issue-75-sandbox-stage-apply.yml
          case "$STAGE" in
            rules-setup|cleanup-rules) ROLE=rules ;;
            project-setup|relationships-setup|cleanup-relationships) ROLE=reconciler ;;
            issues-setup|issues-governed|file-initial|file-stale|cleanup-delivery|cleanup-file|cleanup-issues) ROLE=seeder ;;
            *) echo "unsupported Issue 75 stage" >&2; exit 1 ;;
          esac
          jq -e 'type == "object" and
            ([keys[]] - ["parent_number", "parent_id", "parent_node_id",
              "delivery_number", "delivery_id", "delivery_node_id",
              "dependent_number", "dependent_id", "dependent_node_id",
              "pull_number", "pull_id", "pull_node_id", "branch_head_sha",
              "delivery_input_run_id", "delivery_input_artifact"] | length == 0) and
            ([.[] | type] | all(. == "string"))' <<<"$IDENTITY_FLAGS_JSON"
          printf '%s' "$IDENTITY_FLAGS_JSON" > identity-flags.json
          printf '%s' "$ROLE" > expected-role.txt

      - name: Download and compare exact governed delivery input
        env:
          GH_TOKEN: ${{ github.token }}
          STAGE: ${{ inputs.stage }}
          SOURCE_REVISION: ${{ inputs.source_revision }}
        shell: bash
        run: |
          run_id="$(jq -r '.delivery_input_run_id // ""' identity-flags.json)"
          artifact="$(jq -r '.delivery_input_artifact // ""' identity-flags.json)"
          if [[ "$STAGE" != "issues-governed" ]]; then
            test -z "$run_id"
            test -z "$artifact"
            exit 0
          fi
          if [[ ! "$run_id" =~ ^[0-9]+$ ]] || [[ "$artifact" != "issue-75-delivery-input" ]]; then
            echo "issues-governed requires exact folded delivery-input provenance" >&2
            exit 1
          fi
          gh api \
            "repos/codex-starter-kit-labs/codex-starter-kit-sandbox/actions/runs/$run_id" \
            --jq 'select(.event == "workflow_dispatch" and .path == ".github/workflows/issue-75-delivery-input.yml") | .id' \
            | grep -qx "$run_id"
          gh run download "$run_id" \
            --repo codex-starter-kit-labs/codex-starter-kit-sandbox \
            --name "$artifact" --dir delivery-input
          test -f delivery-input/issue-75-delivery-input.json
          test "$(find delivery-input -type f | wc -l)" -eq 1
          cmp delivery-input/issue-75-delivery-input.json planning/issue-75-delivery-input.json
          jq -e --arg source "$SOURCE_REVISION" \
            --arg parent "$(jq -r '.parent_number // ""' identity-flags.json)" \
            --arg parent_id "$(jq -r '.parent_id // ""' identity-flags.json)" \
            --arg parent_node "$(jq -r '.parent_node_id // ""' identity-flags.json)" \
            --arg delivery "$(jq -r '.delivery_number // ""' identity-flags.json)" \
            --arg delivery_id "$(jq -r '.delivery_id // ""' identity-flags.json)" \
            --arg delivery_node "$(jq -r '.delivery_node_id // ""' identity-flags.json)" \
            --arg dependent "$(jq -r '.dependent_number // ""' identity-flags.json)" \
            --arg dependent_id "$(jq -r '.dependent_id // ""' identity-flags.json)" \
            --arg dependent_node "$(jq -r '.dependent_node_id // ""' identity-flags.json)" '
              .request.intent.source_revision == $source and
              (.artifact_contract.parent.number | tostring) == $parent and
              (.artifact_contract.parent.database_id | tostring) == $parent_id and
              .artifact_contract.parent.node_id == $parent_node and
              (.artifact_contract.delivery.number | tostring) == $delivery and
              (.artifact_contract.delivery.database_id | tostring) == $delivery_id and
              .artifact_contract.delivery.node_id == $delivery_node and
              (.artifact_contract.dependent.number | tostring) == $dependent and
              (.artifact_contract.dependent.database_id | tostring) == $dependent_id and
              .artifact_contract.dependent.node_id == $dependent_node and
              .request.intent.managed_id == ("issue:" + $delivery)' \
            delivery-input/issue-75-delivery-input.json

      - name: Regenerate exact credential-free stage input
        env:
          SOURCE_REVISION: ${{ inputs.source_revision }}
          STAGE: ${{ inputs.stage }}
          APPROVED_BY: ${{ inputs.approved_by }}
          APPROVAL_ID: ${{ inputs.approval_id }}
          APPROVED_AT: ${{ inputs.approved_at }}
          EXPIRES_AT: ${{ inputs.expires_at }}
        shell: bash
        run: |
          DELIVERY_ARG=()
          if [[ "$STAGE" == "issues-governed" ]]; then
            DELIVERY_ARG=(--delivery-input-file "../delivery-input/issue-75-delivery-input.json")
          fi
          go -C tool run ./cmd/issue75-sandbox \
            --stage "$STAGE" --repository "${{ github.workspace }}" --source-revision "$SOURCE_REVISION" \
            --approved-by "$APPROVED_BY" --approval-id "$APPROVAL_ID" --approved-at "$APPROVED_AT" --expires-at "$EXPIRES_AT" \
            --parent-number "$(jq -r '.parent_number // ""' identity-flags.json)" --parent-id "$(jq -r '.parent_id // ""' identity-flags.json)" --parent-node-id "$(jq -r '.parent_node_id // ""' identity-flags.json)" \
            --delivery-number "$(jq -r '.delivery_number // ""' identity-flags.json)" --delivery-id "$(jq -r '.delivery_id // ""' identity-flags.json)" --delivery-node-id "$(jq -r '.delivery_node_id // ""' identity-flags.json)" \
            --dependent-number "$(jq -r '.dependent_number // ""' identity-flags.json)" --dependent-id "$(jq -r '.dependent_id // ""' identity-flags.json)" --dependent-node-id "$(jq -r '.dependent_node_id // ""' identity-flags.json)" \
            --pull-number "$(jq -r '.pull_number // ""' identity-flags.json)" --pull-id "$(jq -r '.pull_id // ""' identity-flags.json)" --pull-node-id "$(jq -r '.pull_node_id // ""' identity-flags.json)" \
            --branch-head-sha "$(jq -r '.branch_head_sha // ""' identity-flags.json)" \
            "${DELIVERY_ARG[@]}" > "$STAGE-input.json"
          cmp "$STAGE-input.json" "planning/$STAGE-input.json"

      - name: Assert exact plan and input bindings
        env:
          SOURCE_REVISION: ${{ inputs.source_revision }}
          STAGE: ${{ inputs.stage }}
        shell: bash
        run: |
          ROLE="$(cat expected-role.txt)"
          expected_files=2
          if [[ "$STAGE" == "issues-governed" ]]; then expected_files=3; fi
          test "$(find planning -type f | wc -l)" -eq "$expected_files"
          jq -e --arg role "$ROLE" --arg stage "$STAGE" --arg source "$SOURCE_REVISION" \
            '.role == $role and .stage_contract.stage == $stage and
             .request.manifest.source_revision == $source and
             .request.manifest.operation_id == ("issue-75-live-" + $stage + "-v1")' "$STAGE-input.json"
          jq -e --arg source "$SOURCE_REVISION" --arg stage "$STAGE" \
            '.schema_version == 1 and .plan.source_revision == $source and
             .plan.operation_id == ("issue-75-live-" + $stage + "-v1") and .plan.plan_id != ""' \
            "planning/$STAGE-planning.json"

      - name: Bind exact plan to its current stage mandate
        env:
          STAGE: ${{ inputs.stage }}
        run: |
          jq -n \
            --slurpfile generated "$STAGE-input.json" \
            --slurpfile planning "planning/$STAGE-planning.json" \
            '{role: $generated[0].role, manifest: $generated[0].request.manifest,
              plan: $planning[0].plan,
              approval: {schema_version: 2, mandate: $generated[0].mandate},
              config: $generated[0].config, app: $generated[0].app, reviewer: {}}' \
            > "$STAGE-apply.json"

      - name: Apply and verify exact approved stage
        env:
          CSK_APP_PRIVATE_KEY: ${{ secrets.CSK_APP_PRIVATE_KEY }}
          STAGE: ${{ inputs.stage }}
        run: >-
          go -C tool run ./cmd/starter-kit sandbox-live-apply
          --input "../$STAGE-apply.json" > "$STAGE-result.json"

      - name: Re-observe and retain exact postcondition
        env:
          CSK_APP_PRIVATE_KEY: ${{ secrets.CSK_APP_PRIVATE_KEY }}
          STAGE: ${{ inputs.stage }}
        run: >-
          go -C tool run ./cmd/starter-kit sandbox-live-plan
          --input "../$STAGE-input.json" > "$STAGE-postcondition.json"

      - name: Require convergence and effect-free postcondition
        env:
          STAGE: ${{ inputs.stage }}
        shell: bash
        run: |
          jq -e '(.apply.status == "applied" or .apply.status == "no_change") and
            .verification.overall_state == "pass" and .status.disposition == "converged"' "$STAGE-result.json"
          jq -e '.inspection.problems == [] and .plan.no_change == true and
            (.plan.effects | length == 0)' "$STAGE-postcondition.json"

      - name: Retain issues-setup identity handoff
        if: ${{ inputs.stage == 'issues-setup' }}
        shell: bash
        run: |
          jq '
            [.inspection.observation.resources[] |
              select(.kind == "fixture-issue") |
              {key: .name, value: {
                number: (.attributes.number | tostring),
                database_id: (.attributes.id | tostring),
                node_id: .attributes.node_id
              }}] | from_entries as $issues |
            {schema_version: 1, stage: "issues-setup",
             source_revision: .plan.source_revision,
             parent_number: $issues.parent.number,
             parent_id: $issues.parent.database_id,
             parent_node_id: $issues.parent.node_id,
             delivery_number: $issues.delivery.number,
             delivery_id: $issues.delivery.database_id,
             delivery_node_id: $issues.delivery.node_id,
             dependent_number: $issues.dependent.number,
             dependent_id: $issues.dependent.database_id,
             dependent_node_id: $issues.dependent.node_id}' \
            issues-setup-postcondition.json > issue-75-issue-identities.json
          jq -e '
            .schema_version == 1 and .stage == "issues-setup" and
            ([.parent_number, .parent_id, .parent_node_id,
              .delivery_number, .delivery_id, .delivery_node_id,
              .dependent_number, .dependent_id, .dependent_node_id] |
              all(type == "string" and length > 0)) and
            ([.parent_number, .delivery_number, .dependent_number] | unique | length == 3) and
            ([.parent_id, .delivery_id, .dependent_id] | unique | length == 3) and
            ([.parent_node_id, .delivery_node_id, .dependent_node_id] | unique | length == 3)' \
            issue-75-issue-identities.json

      - name: Retain credential-free apply and postcondition evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: issue-75-${{ inputs.stage }}-result
          path: |
            ${{ inputs.stage }}-input.json
            ${{ inputs.stage }}-apply.json
            ${{ inputs.stage }}-result.json
            ${{ inputs.stage }}-postcondition.json
            issue-75-issue-identities.json
            delivery-input/issue-75-delivery-input.json
          if-no-files-found: warn
          retention-days: 30
