name: Execute exact Issue 75 cleanup bundle

# Reviewed candidate for installation in the isolated sandbox repository. This is a
# native #75 cleanup contract, not a reuse of #73 fixture manifests. The protected
# contract-delivery environment exposes the approved union of reconciler and seeder App
# private keys to this ordered cleanup runner.

on:
  workflow_call:
    inputs:
      source_revision:
        required: true
        type: string
      planning_run_id:
        required: true
        type: string
      plan_artifact:
        required: true
        type: string
      plan_sha256:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      source_revision:
        description: Exact 40-character reviewed codex-starter-kit commit
        required: true
        type: string
      planning_run_id:
        description: Run containing the exact reviewed Issue 75 cleanup bundle
        required: true
        type: string
      plan_artifact:
        description: Artifact containing only issue-75-cleanup-plan.json
        required: true
        type: string
      plan_sha256:
        description: Exact lowercase SHA-256 of issue-75-cleanup-plan.json
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: starter-kit-contract-sandbox
  cancel-in-progress: false

jobs:
  cleanup:
    environment: contract-delivery
    runs-on: ubuntu-latest
    steps:
      - name: Check out sandbox
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check out exact reviewed Starter Kit candidate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: dragondad22/codex-starter-kit
          ref: ${{ inputs.source_revision }}
          path: tool

      - name: Install pinned Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.5
          cache-dependency-path: tool/go.sum

      - name: Download exact Issue 75 cleanup bundle
        env:
          GH_TOKEN: ${{ github.token }}
          PLANNING_RUN_ID: ${{ inputs.planning_run_id }}
          PLAN_ARTIFACT: ${{ inputs.plan_artifact }}
        shell: bash
        run: |
          if [[ ! "$PLANNING_RUN_ID" =~ ^[0-9]+$ ]] || \
             [[ "$PLAN_ARTIFACT" != "issue-75-cleanup-plan" ]]; then
            echo "cleanup planning run or artifact identity is invalid" >&2
            exit 1
          fi
          gh api \
            "repos/codex-starter-kit-labs/codex-starter-kit-sandbox/actions/runs/$PLANNING_RUN_ID" \
            --jq 'select(.event == "workflow_dispatch" and .path == ".github/workflows/issue-75-cleanup-plan.yml") | .id' \
            | grep -qx "$PLANNING_RUN_ID"
          gh run download "$PLANNING_RUN_ID" \
            --repo codex-starter-kit-labs/codex-starter-kit-sandbox \
            --name "$PLAN_ARTIFACT" --dir cleanup-plan

      - name: Validate content address and exact ordered cleanup contract
        env:
          SOURCE_REVISION: ${{ inputs.source_revision }}
          PLAN_SHA256: ${{ inputs.plan_sha256 }}
        shell: bash
        run: |
          if [[ ! "$SOURCE_REVISION" =~ ^[0-9a-f]{40}$ ]] || \
             [[ ! "$PLAN_SHA256" =~ ^[0-9a-f]{64}$ ]] || \
             [[ "$(git -C tool rev-parse HEAD)" != "$SOURCE_REVISION" ]]; then
            echo "cleanup source or digest is not the exact reviewed identity" >&2
            exit 1
          fi
          cmp .github/workflows/issue-75-contract-cleanup.yml \
            tool/docs/evidence/issue-75-contract-cleanup.yml
          test -f cleanup-plan/issue-75-cleanup-plan.json
          test "$(find cleanup-plan -type f | wc -l)" -eq 1
          test "$(sha256sum cleanup-plan/issue-75-cleanup-plan.json | cut -d ' ' -f 1)" = "$PLAN_SHA256"
          approved_epoch="$(date --date="$(jq -r .approved_at cleanup-plan/issue-75-cleanup-plan.json)" +%s)"
          expires_epoch="$(date --date="$(jq -r .expires_at cleanup-plan/issue-75-cleanup-plan.json)" +%s)"
          current_epoch="$(date +%s)"
          test "$approved_epoch" -le "$current_epoch"
          test "$current_epoch" -lt "$expires_epoch"
          jq -e --arg source "$SOURCE_REVISION" '
            . as $root |
            .schema_version == 1 and .issue_number == 75 and
            .episode_id == "issue-75-20260721-01" and .source_revision == $source and
            .delivery_number != "" and .approved_by != "" and .approval_id != "" and
            .approved_at != "" and .expires_at != "" and
            .target.host == "github.com" and .target.repository_id == "R_kgDOTa0WSg" and
            .target.project_id == "PVT_kwDOEjyyNM4Bdm9F" and
            (.stages | length == 4) and
            (.stages | map(.stage)) == ["cleanup-delivery", "cleanup-file", "cleanup-relationships", "cleanup-issues"] and
            (.stages | map(.role)) == ["seeder", "seeder", "reconciler", "seeder"] and
            ([.stages[] | .apply_input.role] == ["seeder", "seeder", "reconciler", "seeder"]) and
            ([.stages[] | .apply_input.manifest.source_revision] | all(. == $source)) and
            ([.stages[] | .apply_input.plan.source_revision] | all(. == $source)) and
            ([.stages[] | .apply_input.manifest.target] | all(. == $root.target)) and
            ([.stages[] | .apply_input.plan.target] | all(. == $root.target)) and
            ([.stages[] | .apply_input.approval.mandate.target] | all(. == $root.target)) and
            ([.stages[] | .apply_input.config.target] | all(. == $root.target)) and
            ([.stages[] | .apply_input.approval.schema_version] | all(. == 2)) and
            ([.stages[] | .apply_input.approval.mandate.approved_by] | all(. == $root.approved_by)) and
            ([.stages[] | .apply_input.approval.mandate.approval_id] | all(. == $root.approval_id)) and
            ([.stages[] | .apply_input.approval.mandate.approved_at] | all(. == $root.approved_at)) and
            ([.stages[] | .apply_input.approval.mandate.expires_at] | all(. == $root.expires_at)) and
            ([.stages[] | .apply_input.approval.mandate.mandate_id] | all(type == "string" and length > 0)) and
            (.stages[0].apply_input.manifest.operation_id == "issue-75-live-cleanup-delivery-v1") and
            (.stages[1].apply_input.manifest.operation_id == "issue-75-live-cleanup-file-v1") and
            (.stages[2].apply_input.manifest.operation_id == "issue-75-live-cleanup-relationships-v1") and
            (.stages[3].apply_input.manifest.operation_id == "issue-75-live-cleanup-issues-v1") and
            ([.stages[] | .apply_input.plan.operation_id] ==
              ["issue-75-live-cleanup-delivery-v1", "issue-75-live-cleanup-file-v1",
               "issue-75-live-cleanup-relationships-v1", "issue-75-live-cleanup-issues-v1"]) and
            (.stages[0].apply_input.manifest.marker_prefix == ("Closes #" + .delivery_number)) and
            ([.stages[1:][].apply_input.manifest.marker_prefix] |
              all(. == "starter-kit-contract:issue-75-20260721-01")) and
            ([.stages[] |
              (.apply_input.approval.mandate.marker_prefix == .apply_input.manifest.marker_prefix)] |
              all(. == true)) and
            ([.stages[] | .apply_input.plan.plan_id] | all(type == "string" and length > 0)) and
            ([.stages[] | .apply_input.manifest.resources[] | .desired_state] |
              all(. == "absent")) and
            ([.stages[0].apply_input.manifest.resources[].key] ==
              ["fixture:pr:delivery", "fixture:branch:delivery"]) and
            ([.stages[1].apply_input.manifest.resources[].key] == ["file:delivery-check"]) and
            ([.stages[2].apply_input.manifest.resources[].key] ==
              ["relationship:parent-delivery", "relationship:delivery-dependent"]) and
            ([.stages[3].apply_input.manifest.resources[].key] ==
              ["fixture:issue:parent", "fixture:issue:delivery", "fixture:issue:dependent"])' \
            cleanup-plan/issue-75-cleanup-plan.json

      - name: Extract only the four reviewed apply inputs
        shell: bash
        run: |
          mkdir apply-inputs
          jq -e '.stages[0].apply_input' cleanup-plan/issue-75-cleanup-plan.json > apply-inputs/cleanup-delivery.json
          jq -e '.stages[1].apply_input' cleanup-plan/issue-75-cleanup-plan.json > apply-inputs/cleanup-file.json
          jq -e '.stages[2].apply_input' cleanup-plan/issue-75-cleanup-plan.json > apply-inputs/cleanup-relationships.json
          jq -e '.stages[3].apply_input' cleanup-plan/issue-75-cleanup-plan.json > apply-inputs/cleanup-issues.json
          test "$(find apply-inputs -type f | wc -l)" -eq 4

      - name: Apply four cleanup stages in reviewed order
        env:
          CSK_RECONCILER_APP_PRIVATE_KEY: ${{ secrets.CSK_RECONCILER_APP_PRIVATE_KEY }}
          CSK_SEEDER_APP_PRIVATE_KEY: ${{ secrets.CSK_SEEDER_APP_PRIVATE_KEY }}
        shell: bash
        run: |
          failure_stage=""
          for stage in cleanup-delivery cleanup-file cleanup-relationships cleanup-issues; do
            result="$stage-result.json"
            if [[ -n "$failure_stage" ]]; then
              jq -n --arg stage "$stage" --arg blocked_by "$failure_stage" \
                '{schema_version: 1, apply: {status: "skipped"},
                  verification: {overall_state: "needs-review"},
                  status: {disposition: "needs-review"},
                  reason: ("cleanup stopped after " + $blocked_by), stage: $stage}' > "$result"
              continue
            fi
            key="$CSK_SEEDER_APP_PRIVATE_KEY"
            if [[ "$stage" == "cleanup-relationships" ]]; then
              key="$CSK_RECONCILER_APP_PRIVATE_KEY"
            fi
            if ! CSK_APP_PRIVATE_KEY="$key" \
              go -C tool run ./cmd/starter-kit sandbox-live-apply \
              --input "../apply-inputs/$stage.json" > "$result"; then
              if ! jq -e 'type == "object"' "$result" >/dev/null 2>&1; then
                jq -n --arg stage "$stage" \
                  '{schema_version: 1, apply: {status: "failed"},
                    verification: {overall_state: "needs-review"},
                    status: {disposition: "needs-review"},
                    reason: "cleanup apply returned no valid result", stage: $stage}' > "$result"
              fi
              failure_stage="$stage"
              continue
            fi
            if ! jq -e '(.apply.status == "applied" or .apply.status == "no_change") and
              .verification.overall_state == "pass" and .status.disposition == "converged"' \
              "$result" >/dev/null; then
              failure_stage="$stage"
            fi
          done
          test -z "$failure_stage"

      - name: Require every cleanup stage to converge
        if: always()
        shell: bash
        run: |
          for stage in cleanup-delivery cleanup-file cleanup-relationships cleanup-issues; do
            test -f "$stage-result.json"
            jq -e '(.apply.status == "applied" or .apply.status == "no_change") and
              .verification.overall_state == "pass" and .status.disposition == "converged"' \
              "$stage-result.json"
          done

      - name: Emit content-addressed cleanup receipt
        if: always()
        env:
          SOURCE_REVISION: ${{ inputs.source_revision }}
          PLAN_SHA256: ${{ inputs.plan_sha256 }}
        shell: bash
        run: |
          jq -n \
            --arg source_revision "$SOURCE_REVISION" --arg plan_sha256 "$PLAN_SHA256" \
            --slurpfile delivery cleanup-delivery-result.json \
            --slurpfile file cleanup-file-result.json \
            --slurpfile relationships cleanup-relationships-result.json \
            --slurpfile issues cleanup-issues-result.json \
            '[$delivery[0], $file[0], $relationships[0], $issues[0]] as $stages |
             {schema_version: 1, evidence_mode: "live",
              outcome: (if ($stages | all(
                (.apply.status == "applied" or .apply.status == "no_change") and
                .verification.overall_state == "pass" and .status.disposition == "converged"))
                then "pass" else "fail" end),
              issue_number: 75, episode_id: "issue-75-20260721-01",
              source_revision: $source_revision, cleanup_plan_sha256: $plan_sha256,
              stages: $stages}' \
            > issue-75-cleanup-receipt.json

      - name: Retain credential-free cleanup results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: issue-75-cleanup-results-${{ github.run_id }}
          path: |
            cleanup-delivery-result.json
            cleanup-file-result.json
            cleanup-relationships-result.json
            cleanup-issues-result.json
            issue-75-cleanup-receipt.json
          if-no-files-found: warn
          retention-days: 30

      - name: Require complete cleanup receipt
        if: always()
        run: jq -e '.outcome == "pass" and (.stages | length == 4)' issue-75-cleanup-receipt.json
