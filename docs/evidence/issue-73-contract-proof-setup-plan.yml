name: Plan contract proof setup

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: starter-kit-contract-sandbox
  cancel-in-progress: false

jobs:
  plan:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        role: [seeder, rules]
    environment: contract-${{ matrix.role }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out sandbox
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Check out reviewed Starter Kit candidate
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: dragondad22/codex-starter-kit
          ref: 2d916a8870faa8a1cee31b1a7761fed74a9efd10
          path: tool

      - name: Install pinned Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.5
          cache-dependency-path: tool/go.sum

      - name: Generate credential-free proof setup input
        run: >-
          go -C tool run ./cmd/issue73-contract
          --stage proof-setup
          --role "${{ matrix.role }}"
          --repository "${{ github.workspace }}"
          --source-revision 2d916a8870faa8a1cee31b1a7761fed74a9efd10
          --base-sha d7c2174fbf67bebdeb41fc78416dc6332e5d44f9
          > "${{ matrix.role }}-input.json"

      - name: Inspect and emit immutable proof setup plan
        env:
          CSK_APP_PRIVATE_KEY: ${{ secrets.CSK_APP_PRIVATE_KEY }}
        run: >-
          go -C tool run ./cmd/starter-kit sandbox-live-plan
          --input "../${{ matrix.role }}-input.json"
          > "${{ matrix.role }}-planning.json"

      - name: Retain redacted proof setup plan evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: issue-73-proof-setup-${{ matrix.role }}-planning
          path: ${{ matrix.role }}-planning.json
          if-no-files-found: error
          retention-days: 30
