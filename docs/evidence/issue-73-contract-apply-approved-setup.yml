name: Apply approved contract sandbox setup

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: starter-kit-contract-sandbox
  cancel-in-progress: false

jobs:
  apply:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        role: [rules, seeder]
    environment: contract-${{ matrix.role }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out sandbox
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Check out reviewed Starter Kit candidate
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: dragondad22/codex-starter-kit
          ref: 690de42545bb0774bdf33e83886be5f31f7e0277
          path: tool

      - name: Install pinned Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.5
          cache-dependency-path: tool/go.sum

      - name: Download reviewed plan artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh run download 29581912415
          --repo codex-starter-kit-labs/codex-starter-kit-sandbox
          --name "issue-73-${{ matrix.role }}-planning"
          --dir plan

      - name: Rebuild credential-free approved input
        run: >-
          go -C tool run ./cmd/issue73-contract
          --role "${{ matrix.role }}"
          --repository "${{ github.workspace }}"
          --source-revision 690de42545bb0774bdf33e83886be5f31f7e0277
          --base-sha 34073c3ca2f6fea323a8b0160165aed6f5a4595f
          > "${{ matrix.role }}-input.json"

      - name: Bind exact plan to approved execution mandate
        run: |
          jq -n \
            --slurpfile generated "${{ matrix.role }}-input.json" \
            --slurpfile planning "plan/${{ matrix.role }}-planning.json" \
            '{
              role: $generated[0].role,
              manifest: $generated[0].request.manifest,
              plan: $planning[0].plan,
              approval: {
                schema_version: 2,
                mandate: $generated[0].mandate
              },
              config: $generated[0].config,
              app: $generated[0].app
            }' \
            > "${{ matrix.role }}-apply.json"

      - name: Apply and verify approved role plan
        env:
          CSK_APP_PRIVATE_KEY: ${{ secrets.CSK_APP_PRIVATE_KEY }}
        run: >-
          go -C tool run ./cmd/starter-kit sandbox-live-apply
          --input "../${{ matrix.role }}-apply.json"
          > "${{ matrix.role }}-result.json"

      - name: Require converged verification
        run: >-
          jq -e
          '(.apply.status == "applied" or .apply.status == "no_change") and .verification.overall_state == "pass" and .status.disposition == "converged"'
          "${{ matrix.role }}-result.json"

      - name: Retain redacted apply evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: issue-73-${{ matrix.role }}-setup-result
          path: ${{ matrix.role }}-result.json
          if-no-files-found: error
          retention-days: 30
