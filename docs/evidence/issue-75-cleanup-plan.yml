name: Build exact Issue 75 cleanup bundle

# Reviewed credential-free candidate for installation in the isolated sandbox
# repository. It combines the four independently observed cleanup plans without
# exposing either App credential. Execution remains a separate protected action.

on:
  workflow_dispatch:
    inputs:
      source_revision:
        description: Exact 40-character reviewed codex-starter-kit commit
        required: true
        type: string
      delivery_number:
        description: Exact governed delivery fixture issue number
        required: true
        type: string
      approved_by:
        description: Approving human identity shared by all cleanup stages
        required: true
        type: string
      approval_id:
        description: Durable approval record shared by all cleanup stages
        required: true
        type: string
      approved_at:
        description: Active approval time in RFC3339 format
        required: true
        type: string
      expires_at:
        description: Authority expiry in RFC3339 format
        required: true
        type: string
      planning_runs_json:
        description: Exact run IDs for the four independently planned cleanup stages
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: starter-kit-contract-sandbox
  cancel-in-progress: false

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Check out sandbox
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check out exact reviewed Starter Kit candidate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: dragondad22/codex-starter-kit
          ref: ${{ inputs.source_revision }}
          path: tool

      - name: Validate exact source and cleanup planning run identities
        env:
          SOURCE_REVISION: ${{ inputs.source_revision }}
          DELIVERY_NUMBER: ${{ inputs.delivery_number }}
          PLANNING_RUNS_JSON: ${{ inputs.planning_runs_json }}
        shell: bash
        run: |
          if [[ ! "$SOURCE_REVISION" =~ ^[0-9a-f]{40}$ ]] || \
             [[ "$(git -C tool rev-parse HEAD)" != "$SOURCE_REVISION" ]] || \
             [[ ! "$DELIVERY_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "cleanup bundle source or delivery identity is invalid" >&2
            exit 1
          fi
          cmp .github/workflows/issue-75-cleanup-plan.yml \
            tool/docs/evidence/issue-75-cleanup-plan.yml
          jq -e '
            type == "object" and
            (keys | sort) == (["cleanup-delivery", "cleanup-file",
              "cleanup-relationships", "cleanup-issues"] | sort) and
            ([.[] | type] | all(. == "string")) and
            ([.[] | test("^[1-9][0-9]*$")] | all)' <<<"$PLANNING_RUNS_JSON"
          printf '%s' "$PLANNING_RUNS_JSON" > planning-runs.json

      - name: Download four exact stage planning artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          for stage in cleanup-delivery cleanup-file cleanup-relationships cleanup-issues; do
            run_id="$(jq -r --arg stage "$stage" '.[$stage]' planning-runs.json)"
            gh api \
              "repos/codex-starter-kit-labs/codex-starter-kit-sandbox/actions/runs/$run_id" \
              --jq 'select(.event == "workflow_dispatch" and .path == ".github/workflows/issue-75-sandbox-stage-plan.yml") | .id' \
              | grep -qx "$run_id"
            gh run download "$run_id" \
              --repo codex-starter-kit-labs/codex-starter-kit-sandbox \
              --name "issue-75-$stage-planning" --dir "planning/$stage"
            test -f "planning/$stage/$stage-input.json"
            test -f "planning/$stage/$stage-planning.json"
            test "$(find "planning/$stage" -type f | wc -l)" -eq 2
          done

      - name: Validate all stage inputs and immutable plans
        env:
          SOURCE_REVISION: ${{ inputs.source_revision }}
          APPROVED_BY: ${{ inputs.approved_by }}
          APPROVAL_ID: ${{ inputs.approval_id }}
          APPROVED_AT: ${{ inputs.approved_at }}
          EXPIRES_AT: ${{ inputs.expires_at }}
        shell: bash
        run: |
          for stage in cleanup-delivery cleanup-file cleanup-relationships cleanup-issues; do
            input="planning/$stage/$stage-input.json"
            planning="planning/$stage/$stage-planning.json"
            expected_role=seeder
            if [[ "$stage" == "cleanup-relationships" ]]; then expected_role=reconciler; fi
            jq -e --arg stage "$stage" --arg role "$expected_role" \
              --arg source "$SOURCE_REVISION" --arg approved_by "$APPROVED_BY" \
              --arg approval_id "$APPROVAL_ID" --arg approved_at "$APPROVED_AT" \
              --arg expires_at "$EXPIRES_AT" '
                .role == $role and .stage_contract.stage == $stage and
                .request.manifest.source_revision == $source and
                .request.manifest.operation_id == ("issue-75-live-" + $stage + "-v1") and
                .request.manifest.target.host == "github.com" and
                .request.manifest.target.repository_id == "R_kgDOTa0WSg" and
                .request.manifest.target.project_id == "PVT_kwDOEjyyNM4Bdm9F" and
                .mandate.approved_by == $approved_by and
                .mandate.approval_id == $approval_id and
                .mandate.approved_at == $approved_at and
                .mandate.expires_at == $expires_at and
                .mandate.target == .request.manifest.target and
                .mandate.marker_prefix == .request.manifest.marker_prefix' "$input"
            jq -e --arg stage "$stage" --arg source "$SOURCE_REVISION" '
                .schema_version == 1 and .inspection.problems == [] and
                .plan.source_revision == $source and
                .plan.operation_id == ("issue-75-live-" + $stage + "-v1") and
                .plan.plan_id != ""' "$planning"
          done

      - name: Build the exact ordered cleanup bundle
        env:
          SOURCE_REVISION: ${{ inputs.source_revision }}
          DELIVERY_NUMBER: ${{ inputs.delivery_number }}
          APPROVED_BY: ${{ inputs.approved_by }}
          APPROVAL_ID: ${{ inputs.approval_id }}
          APPROVED_AT: ${{ inputs.approved_at }}
          EXPIRES_AT: ${{ inputs.expires_at }}
        shell: bash
        run: |
          mkdir apply-inputs
          for stage in cleanup-delivery cleanup-file cleanup-relationships cleanup-issues; do
            jq -n \
              --slurpfile generated "planning/$stage/$stage-input.json" \
              --slurpfile planning "planning/$stage/$stage-planning.json" \
              '{role: $generated[0].role, manifest: $generated[0].request.manifest,
                plan: $planning[0].plan,
                approval: {schema_version: 2, mandate: $generated[0].mandate},
                config: $generated[0].config, app: $generated[0].app, reviewer: {}}' \
              > "apply-inputs/$stage.json"
          done
          jq -n \
            --arg source_revision "$SOURCE_REVISION" \
            --arg delivery_number "$DELIVERY_NUMBER" \
            --arg approved_by "$APPROVED_BY" --arg approval_id "$APPROVAL_ID" \
            --arg approved_at "$APPROVED_AT" --arg expires_at "$EXPIRES_AT" \
            --slurpfile delivery apply-inputs/cleanup-delivery.json \
            --slurpfile file apply-inputs/cleanup-file.json \
            --slurpfile relationships apply-inputs/cleanup-relationships.json \
            --slurpfile issues apply-inputs/cleanup-issues.json \
            '{schema_version: 1, issue_number: 75,
              episode_id: "issue-75-20260721-01", source_revision: $source_revision,
              delivery_number: $delivery_number, approved_by: $approved_by,
              approval_id: $approval_id, approved_at: $approved_at, expires_at: $expires_at,
              target: $delivery[0].manifest.target,
              stages: [
                {stage: "cleanup-delivery", role: "seeder", apply_input: $delivery[0]},
                {stage: "cleanup-file", role: "seeder", apply_input: $file[0]},
                {stage: "cleanup-relationships", role: "reconciler", apply_input: $relationships[0]},
                {stage: "cleanup-issues", role: "seeder", apply_input: $issues[0]}
              ]}' > issue-75-cleanup-plan.json
          sha256sum issue-75-cleanup-plan.json | cut -d ' ' -f 1 \
            > issue-75-cleanup-plan.sha256

      - name: Retain content-addressed cleanup bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: issue-75-cleanup-plan
          path: issue-75-cleanup-plan.json
          if-no-files-found: error
          retention-days: 30

      - name: Retain cleanup bundle digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: issue-75-cleanup-plan-digest
          path: issue-75-cleanup-plan.sha256
          if-no-files-found: error
          retention-days: 30
